name: Boundary Run v64 Release Asset Verification

on:
  workflow_dispatch:

permissions:
  contents: read

jobs:
  verify-release-assets:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.x'
      - name: Build release assets without publishing
        run: bash scripts/package_release.sh
      - name: Upload release assets for manual download
        uses: actions/upload-artifact@v4
        with:
          name: axonos-boundary-run-v64-release-assets
          path: release-assets/
