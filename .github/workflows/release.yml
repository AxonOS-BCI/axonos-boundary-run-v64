# Attribution: Denis Yermakou
name: Boundary Run v64 Release

on:
  push:
    tags:
      - 'v*'

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - name: Verify and package
        run: bash scripts/package_release.sh
      - name: Publish GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          TAG="${GITHUB_REF_NAME}"
          gh release view "$TAG" >/dev/null 2>&1 && EXISTS=1 || EXISTS=0
          if [ "$EXISTS" = "0" ]; then
            gh release create "$TAG" release-assets/* \
              --title "AxonOS Boundary Run ${TAG#v} — The Sovereign Signal" \
              --notes-file RELEASE_NOTES_v64.0.0.md \
              --latest
          else
            gh release upload "$TAG" release-assets/* --clobber
            gh release edit "$TAG" \
              --title "AxonOS Boundary Run ${TAG#v} — The Sovereign Signal" \
              --notes-file RELEASE_NOTES_v64.0.0.md \
              --latest
          fi
