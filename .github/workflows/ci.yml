name: CI

on:
  push:
  pull_request:

permissions:
  contents: read

jobs:
  static-smoke:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: npm test
      - name: Check required files
        run: |
          test -f index.html
          test -f VERSION
          test -f src/game.js
          test -f src/manifest.json
          test "$(cat VERSION)" = "64.0.0"
      - name: Reject patch artifacts
        run: |
          ! find . -type f \( -name '*.patch' -o -name '*.diff' \) | grep .
