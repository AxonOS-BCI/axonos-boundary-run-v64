# Attribution: Denis Yermakou
name: Boundary Run v64 CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

permissions:
  contents: read

jobs:
  static-audit:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7
      - uses: actions/setup-node@v4
        with:
          node-version: '22'
      - uses: actions/setup-python@v5
        with:
          python-version: '3.12'
      - run: node qa/boundary-run-static-smoke-v64.mjs
      - run: python3 tools/boundary_run_audit_v64.py
      - name: Verify replay proofs (Python re-simulation)
        run: python3 tools/boundary_run_verify_v3.py qa/proofs/golden-1.json qa/proofs/golden-2.json qa/proofs/golden-3.json
      - name: Cross-check determinism (JavaScript core)
        run: node qa/replay_core_vectors.mjs
      - run: bash scripts/verify_no_sw.sh
      - run: bash scripts/verify_donation_address.sh
      - run: bash scripts/verify_attribution.sh
      - run: bash scripts/reproducibility_check.sh
      - run: bash scripts/build_web.sh dist
      - run: bash scripts/package_release.sh
      - uses: actions/upload-artifact@v4
        with:
          name: boundary-run-v64-dist
          path: dist
      - uses: actions/upload-artifact@v4
        with:
          name: boundary-run-v64-release-assets
          path: release-assets
