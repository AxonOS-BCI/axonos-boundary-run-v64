# Created by Denis Yermakou, Founder & CEO of AxonOS.
# Dependabot is PR-only. Do not merge bot commits directly if the contributor graph must remain botless.
version: 2
updates:
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(actions)"
  - package-ecosystem: "npm"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 3
    commit-message:
      prefix: "chore(npm)"
